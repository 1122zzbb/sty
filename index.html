<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>学习日志</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--bg-card:#fff;--bg-muted:#f0eeea;
  --text:#1a1a18;--text-2:#6b6b65;--text-3:#9b9b93;
  --border:rgba(0,0,0,.09);--border-2:rgba(0,0,0,.16);
  --accent:#1a1a18;--green:#4caf50;--red:#e53935;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--bg-card:#1e1e1b;--bg-muted:#252521;
  --text:#f0eeea;--text-2:#9b9b93;--text-3:#6b6b65;
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.15);--accent:#f0eeea;
}}
html{font-size:16px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:720px;margin:0 auto;padding:2.5rem 1.25rem 5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem}
.logo{display:flex;align-items:baseline;gap:10px}
.logo h1{font-family:'Noto Serif SC',serif;font-size:21px;font-weight:500;letter-spacing:-.01em}
.sync-indicators{display:flex;flex-direction:column;gap:4px}
.sync-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);transition:background .3s}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}
.date-label{font-size:13px;color:var(--text-2);background:var(--bg-muted);border:.5px solid var(--border);padding:4px 12px;border-radius:100px}
.tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:2rem}
.tab{font-family:inherit;font-size:14px;font-weight:400;color:var(--text-2);background:none;border:none;padding:9px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;transition:color .15s,border-color .15s}
.tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--bg-card);border:.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1rem}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}.field.full{grid-column:1/-1}
.field label{font-size:12px;color:var(--text-2)}
.field input,.field textarea,.field select{font-family:inherit;font-size:14px;color:var(--text);background:var(--bg-muted);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field textarea:focus{border-color:var(--border-2)}
.field select{cursor:pointer}
.field textarea{min-height:76px;resize:vertical;line-height:1.55}
.subject-wrap{display:flex;flex-direction:column;gap:8px}
.subject-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;padding:5px 13px;border-radius:100px;border:.5px solid var(--border);background:var(--bg-muted);color:var(--text-2);cursor:pointer;transition:all .15s;user-select:none}
.chip.selected{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.subject-custom-row{display:flex;gap:6px;align-items:center}
.subject-custom-row input{flex:1;font-family:inherit;font-size:13px;padding:7px 10px;border:.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-muted);color:var(--text);outline:none}
.subject-custom-row input:focus{border-color:var(--border-2)}
.subject-custom-row button{font-family:inherit;font-size:12px;padding:7px 13px;border:.5px solid var(--border-2);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);cursor:pointer;white-space:nowrap}
.subject-custom-row button:hover{background:var(--bg-muted)}
.upload-zone{border:1px dashed var(--border-2);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;cursor:pointer;position:relative;transition:background .15s,border-color .15s;background:var(--bg-card)}
.upload-zone:hover,.upload-zone.dragover{background:var(--bg-muted);border-color:var(--text-3)}
.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{width:38px;height:38px;margin:0 auto 12px;border:.5px solid var(--border-2);border-radius:50%;display:flex;align-items:center;justify-content:center}
.upload-icon svg{width:17px;height:17px;stroke:var(--text-2);fill:none;stroke-width:1.5}
.upload-zone p{font-size:14px;color:var(--text-2);line-height:1.65}
.upload-zone strong{color:var(--text);font-weight:500}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:1rem}
.preview-item{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;border:.5px solid var(--border);position:relative}
.preview-item img{width:100%;height:100%;object-fit:cover;display:block}
.remove-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.55);border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
.btn-primary{width:100%;padding:13px;margin-top:1.25rem;font-family:inherit;font-size:15px;font-weight:500;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{opacity:.82}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn{font-family:inherit;font-size:13px;padding:7px 14px;background:var(--bg-card);border:.5px solid var(--border-2);border-radius:var(--radius-sm);cursor:pointer;color:var(--text);transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--bg-muted)}
.btn-group{display:flex;gap:10px;margin-top:1.25rem}
.btn-group .btn-primary{flex:1;margin-top:0}
.result-card{background:var(--bg-card);border:.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-top:1.25rem}
.result-meta{display:flex;justify-content:space-between;align-items:center;padding-bottom:1rem;margin-bottom:1.25rem;border-bottom:.5px solid var(--border);flex-wrap:wrap;gap:8px}
.result-meta .meta-label{font-size:13px;color:var(--text-2)}
.result-content{font-size:14px;line-height:1.85;color:var(--text)}
.section-title{display:block;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-top:1.25rem;margin-bottom:.35rem}
.section-title:first-child{margin-top:0}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.25);border-top-color:rgba(255,255,255,.9);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
.spinner-sm{width:13px;height:13px;border:1.5px solid var(--border-2);border-top-color:var(--text-2);border-radius:50%;animation:spin .65s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.75rem}
.stat-box{background:var(--bg-muted);border-radius:var(--radius-sm);padding:14px 16px}
.stat-box .s-label{font-size:11px;color:var(--text-3);margin-bottom:5px}
.stat-box .s-value{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:500;color:var(--text);line-height:1}
.stat-box .s-unit{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--text-2)}
.history-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.history-top h2{font-size:15px;font-weight:500}
.hdr-right{display:flex;gap:8px;align-items:center}
.hdr-right select{font-family:inherit;font-size:13px;background:var(--bg-muted);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);outline:none}
.export-wrap{position:relative}
.export-btn{font-family:inherit;font-size:13px;padding:6px 12px;background:var(--bg-card);border:.5px solid var(--border-2);border-radius:var(--radius-sm);cursor:pointer;color:var(--text);display:flex;align-items:center;gap:4px}
.export-btn:hover{background:var(--bg-muted)}
.export-dd{position:absolute;right:0;top:calc(100% + 5px);background:var(--bg-card);border:.5px solid var(--border-2);border-radius:var(--radius-sm);min-width:120px;z-index:30;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden;display:none}
.export-dd.open{display:block}
.export-dd button{display:block;width:100%;text-align:left;font-family:inherit;font-size:13px;padding:9px 14px;background:none;border:none;cursor:pointer;color:var(--text)}
.export-dd button:hover{background:var(--bg-muted)}
.record-item{background:var(--bg-card);border:.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.record-item:hover{border-color:var(--border-2)}
.record-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.record-date{font-size:14px;font-weight:500}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 9px;border-radius:100px;background:var(--bg-muted);color:var(--text-2);border:.5px solid var(--border)}
.tag.cloud{color:var(--green);border-color:var(--green);background:rgba(76,175,80,.07)}
.record-excerpt{font-size:13px;color:var(--text-2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;padding:3.5rem 2rem;color:var(--text-3);font-size:14px;line-height:1.9}
.inline-row{display:flex;gap:8px;align-items:center}.inline-row input{flex:1}
.conn-status{font-size:12px;color:var(--text-3)}.conn-status.ok{color:var(--green)}.conn-status.err{color:var(--red)}
.hint-text{font-size:11px;color:var(--text-3);margin-top:5px;line-height:1.5}
.lock-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.lock-bar .card-title{margin:0}
.lock-btn{font-family:inherit;font-size:11px;padding:4px 10px;border:.5px solid var(--border);border-radius:100px;background:var(--bg-muted);cursor:pointer;color:var(--text-3)}
.lock-btn:hover{color:var(--text)}
.cfg-locked{pointer-events:none;opacity:.5}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:1rem}
.modal{background:var(--bg-card);border:.5px solid var(--border);border-radius:var(--radius);max-width:580px;width:100%;max-height:82vh;overflow-y:auto;padding:1.5rem}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:.5px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:500}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-2);padding:2px 6px}
.modal-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-bottom:1.25rem}
.modal-imgs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm);border:.5px solid var(--border)}
.modal-body{font-size:14px;line-height:1.85;white-space:pre-wrap;color:var(--text)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 20px;border-radius:100px;font-size:13px;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:480px){
  .field-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .stats-row .stat-box:last-child{grid-column:1/-1}
  .btn-group{flex-direction:column}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <h1>学习日志</h1>
      <div class="sync-indicators">
        <div class="sync-row"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">云端检测中…</span></div>
        <div class="sync-row"><div class="sync-dot" id="apiSyncDot"></div><span id="apiSyncLabel">API 检测中…</span></div>
      </div>
    </div>
    <span class="date-label" id="todayLabel"></span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('record')">今日记录</button>
    <button class="tab" onclick="switchTab('history')">历史回顾</button>
    <button class="tab" onclick="switchTab('settings')">设置</button>
  </div>

  <!-- 今日记录 -->
  <div id="panel-record" class="panel active">
    <div class="card">
      <div class="card-title">今日信息</div>
      <div class="field-grid">
        <div class="field full">
          <label>学习科目（点击选择，可多选）</label>
          <div class="subject-wrap">
            <div class="subject-chips" id="subjectChips">
              <span class="chip" data-val="数学" onclick="toggleChip(this)">数学</span>
              <span class="chip" data-val="英语" onclick="toggleChip(this)">英语</span>
              <span class="chip" data-val="政治" onclick="toggleChip(this)">政治</span>
              <span class="chip" data-val="408" onclick="toggleChip(this)">408</span>
              <span class="chip" data-val="软考" onclick="toggleChip(this)">软考</span>
            </div>
            <div class="subject-custom-row">
              <input id="customSubjectInput" placeholder="自定义科目后回车添加…" onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomChip()}"/>
              <button onclick="addCustomChip()">+ 添加</button>
            </div>
          </div>
        </div>
        <div class="field">
          <label>学习时长</label>
          <select id="hours" onchange="updateRecordButtons()">
            <option value="">请选择时长</option>
          </select>
        </div>
        <div class="field full">
          <label>备注（状态、卡点、今日收获等）</label>
          <textarea id="memo" placeholder="今天张宇第3章做完了，积分换元有点卡，下午效率不太好…" oninput="updateRecordButtons()"></textarea>
        </div>
      </div>
    </div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)"/>
      <div class="upload-icon"><svg viewBox="0 0 24 24"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg></div>
      <p><strong>点击或拖拽上传今日学习照片</strong><br>笔记、错题、时间轴截图均可，支持多张</p>
    </div>
    <div class="preview-grid" id="previewGrid"></div>

    <div class="btn-group">
      <button class="btn-primary" id="saveRecordBtn" onclick="saveSimpleRecord()" disabled>💾 直接保存</button>
      <button class="btn-primary" id="analyzeBtn" onclick="analyze()" disabled>🤖 AI 分析</button>
    </div>
    <div id="resultArea"></div>
  </div>

  <!-- 历史回顾 -->
  <div id="panel-history" class="panel">
    <div class="stats-row" id="statsRow"></div>
    <div class="history-top">
      <h2>学习记录</h2>
      <div class="hdr-right">
        <select id="filterSel" onchange="renderHistory()">
          <option value="all">全部</option>
          <option value="week">近一周</option>
          <option value="month">近一月</option>
        </select>
        <div class="export-wrap" id="exportWrap">
          <button class="export-btn" onclick="toggleExportMenu(event)">导出 MD ▾</button>
          <div class="export-dd" id="exportDd">
            <button onclick="exportMd('today')">今天</button>
            <button onclick="exportMd('week')">本周</button>
            <button onclick="exportMd('month')">本月</button>
            <button onclick="exportMd('all')">全部</button>
          </div>
        </div>
      </div>
    </div>
    <div id="recordList"></div>
  </div>

  <!-- 设置 -->
  <div id="panel-settings" class="panel">
    <div class="card">
      <div class="lock-bar">
        <div class="card-title">AI 分析设置</div>
        <button class="lock-btn" id="apiLockBtn" onclick="toggleApiLock()">🔒 已锁定</button>
      </div>
      <div id="apiCfgBody" class="cfg-locked">
        <div class="field-grid" style="margin-bottom:12px">
          <div class="field">
            <label>API 提供商</label>
            <select id="apiProvider" onchange="onProviderChange()">
              <option value="siliconflow">硅基流动 (SiliconFlow)</option>
              <option value="deepseek">DeepSeek 官方</option>
            </select>
            <span class="hint-text" id="providerHint"></span>
          </div>
          <div class="field">
            <label>选择模型</label>
            <select id="modelSelect" onchange="onModelSelectChange()"></select>
          </div>
          <div class="field full">
            <label>自定义模型名称（填写后优先使用）</label>
            <input id="apiModel" type="text" placeholder="留空则使用上方下拉的模型"/>
          </div>
          <div class="field full">
            <label id="apiKeyLabel">API Key</label>
            <input id="apiKey" type="password" placeholder="sk-…"/>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <button class="btn" onclick="saveApiSettings()">保存并锁定</button>
          <button class="btn" onclick="testApiConnection(true)">测试连接</button>
          <span class="conn-status" id="apiConnStatus"></span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="lock-bar">
        <div class="card-title">Supabase 云端存储</div>
        <button class="lock-btn" id="sbLockBtn" onclick="toggleSbLock()">🔒 已锁定</button>
      </div>
      <div id="sbCfgBody" class="cfg-locked">
        <div class="field-grid" style="margin-bottom:12px">
          <div class="field full"><label>Project URL</label><input id="sbUrl" type="text" placeholder="https://xxx.supabase.co"/></div>
          <div class="field full"><label>Anon Key</label><input id="sbKey" type="password" placeholder="eyJ…"/></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn" onclick="saveAndTestSb()">保存并测试连接</button>
          <span class="conn-status" id="connStatus"></span>
        </div>
        <span class="hint-text">保存成功后自动锁定，防止误改</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">数据管理</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <button class="btn" onclick="exportSettingsJson()">导出设置备份</button>
        <label class="btn" style="cursor:pointer">导入设置<input type="file" accept=".json" style="display:none" onchange="importSettings(event)"/></label>
        <button class="btn" style="color:var(--red)" onclick="if(confirm('确认清空本地缓存？'))clearLocal()">清空本地缓存</button>
      </div>
      <span class="hint-text">导出的设置文件可在新设备导入快速配置，密钥经过混淆处理，请妥善保管</span>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-imgs" id="modalImgs"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const CACHE_KEY='study_logs_v4';
const CFG_KEY='study_cfg_v2';
let images=[];
let pending=null;
let sb=null;
let _records=[];
let selectedSubjects=new Set();
let apiLocked=true;
let sbLocked=true;

const MODEL_PRESETS={
  siliconflow:['Qwen/Qwen2.5-VL-72B-Instruct','Pro/Qwen/Qwen2.5-VL-7B-Instruct','Qwen/Qwen3-14B','deepseek-ai/DeepSeek-V3','deepseek-ai/deepseek-vl2'],
  deepseek:['deepseek-chat','deepseek-reasoner']
};
const DEFAULT_MODEL={siliconflow:'Qwen/Qwen2.5-VL-72B-Instruct',deepseek:'deepseek-chat'};
const ENDPOINTS={
  siliconflow:'https://api.siliconflow.cn/v1/chat/completions',
  deepseek:'https://api.deepseek.com/v1/chat/completions'
};
const VL_KEYWORDS=['vl','vision','qwen2.5-vl','qwen-vl'];

const $=id=>document.getElementById(id);

/* 混淆（防明文） */
function obf(s){try{return btoa(unescape(encodeURIComponent(s))).split('').reverse().join('')}catch{return s}}
function dob(s){try{return decodeURIComponent(escape(atob(s.split('').reverse().join(''))))}catch{return s}}

/* 配置 */
function cfg(update){
  let cur={};try{cur=JSON.parse(localStorage.getItem(CFG_KEY)||'{}')}catch{}
  if(!update)return cur;
  localStorage.setItem(CFG_KEY,JSON.stringify({...cur,...update}));
}
function saveSens(k,v){cfg({[k]:obf(v)})}
function readSens(k){const v=cfg()[k];return v?dob(v):''}

/* 时长下拉 0.5~6，步长0.2 */
function buildHoursSelect(){
  const sel=$('hours');
  sel.innerHTML='<option value="">请选择时长</option>';
  let h=0.5;
  while(h<=6.001){
    const r=Math.round(h*10)/10;
    const o=document.createElement('option');
    o.value=r;o.textContent=r+'小时';
    sel.appendChild(o);
    h=Math.round((h+0.2)*10)/10;
  }
}

/* 科目 chips */
function toggleChip(el){
  const v=el.dataset.val;
  if(selectedSubjects.has(v)){selectedSubjects.delete(v);el.classList.remove('selected')}
  else{selectedSubjects.add(v);el.classList.add('selected')}
  updateRecordButtons();
}

function addCustomChip(){
  const inp=$('customSubjectInput');
  const val=inp.value.trim();
  if(!val)return;
  if(document.querySelector(`.chip[data-val="${CSS.escape(val)}"]`)){inp.value='';return}
  const chip=document.createElement('span');
  chip.className='chip selected';chip.dataset.val=val;chip.textContent=val;
  chip.onclick=()=>toggleChip(chip);
  $('subjectChips').appendChild(chip);
  selectedSubjects.add(val);inp.value='';
  updateRecordButtons();
}

function getSubjectsStr(){return[...selectedSubjects].join('、')}
function hasContent(){return selectedSubjects.size>0||$('hours').value||$('memo').value.trim()||images.length>0}
function updateRecordButtons(){const ok=hasContent();$('saveRecordBtn').disabled=!ok;$('analyzeBtn').disabled=!ok}

/* 本地存储 */
function localRecords(){try{return JSON.parse(localStorage.getItem(CACHE_KEY)||'[]')}catch{return[]}}
function cacheRecord(r){
  const all=localRecords();
  const i=all.findIndex(x=>x.date===r.date);
  if(i>=0)all[i]=r;else all.unshift(r);
  localStorage.setItem(CACHE_KEY,JSON.stringify(all));
}

/* Supabase */
function initSb(url,key){sb=(url&&key)?{url:url.replace(/\/$/,''),key}:null}
async function sbReq(path,opts={}){
  const r=await fetch(sb.url+'/rest/v1/'+path,{...opts,headers:{apikey:sb.key,Authorization:'Bearer '+sb.key,'Content-Type':'application/json',Prefer:opts.prefer||'',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.statusText)}
  const t=await r.text();return t?JSON.parse(t):null;
}
function setSyncStatus(type,ok,msg){
  $(type==='sync'?'syncDot':'apiSyncDot').className='sync-dot '+(ok?'ok':'err');
  $(type==='sync'?'syncLabel':'apiSyncLabel').textContent=msg;
}
async function testSb(){
  if(!sb){setSyncStatus('sync',false,'未配置');return false}
  try{await sbReq('study_logs?limit=1&select=id');setSyncStatus('sync',true,'云端已连接');return true}
  catch{setSyncStatus('sync',false,'连接失败');return false}
}
async function upsert(record){
  cacheRecord(record);if(!sb)return'local';
  try{
    const exist=await sbReq(`study_logs?date=eq.${record.date}&select=id`);
    const payload={subjects:record.subjects,hours:record.hours?parseFloat(record.hours):null,memo:record.memo,analysis:record.analysis,images:record.images||[],updated_at:new Date().toISOString()};
    if(exist&&exist.length>0)await sbReq(`study_logs?date=eq.${record.date}`,{method:'PATCH',body:JSON.stringify(payload)});
    else await sbReq('study_logs',{method:'POST',prefer:'resolution=merge-duplicates',body:JSON.stringify({date:record.date,...payload})});
    return'cloud';
  }catch(e){toast('云端保存失败：'+e.message);return'local'}
}
async function loadRecords(){
  if(!sb)return localRecords();
  try{
    const data=await sbReq('study_logs?select=*&order=date.desc');
    if(data){localStorage.setItem(CACHE_KEY,JSON.stringify(data.map(r=>({date:r.date,subjects:r.subjects,hours:r.hours,memo:r.memo,analysis:r.analysis,images:r.images||[]}))));return data}
  }catch{toast('云端读取失败，显示本地缓存')}
  return localRecords();
}

function today(){return new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-')}

/* 拖拽上传 */
function setupDrag(){
  const z=$('uploadZone');
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dragover')});
  z.addEventListener('dragleave',()=>z.classList.remove('dragover'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('dragover');handleFiles(e.dataTransfer.files)});
}
function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(!f.type.startsWith('image/'))return;
    const rd=new FileReader();
    rd.onload=e=>{images.push({name:f.name,data:e.target.result});renderPreviews();updateRecordButtons()};
    rd.readAsDataURL(f);
  });
}
function renderPreviews(){$('previewGrid').innerHTML=images.map((img,i)=>`<div class="preview-item"><img src="${img.data}"/><button class="remove-btn" onclick="removeImg(${i})">✕</button></div>`).join('')}
function removeImg(i){images.splice(i,1);renderPreviews();updateRecordButtons()}

/* 直接保存 */
async function saveSimpleRecord(){
  if(!hasContent()){toast('请至少填写一项信息');return}
  const record={date:today(),subjects:getSubjectsStr(),hours:$('hours').value,memo:$('memo').value,analysis:'',images:images.map(i=>i.data)};
  const btn=$('saveRecordBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>保存中…';
  try{const dest=await upsert(record);toast(dest==='cloud'?'已同步到云端':'已保存到本地');resetForm()}
  catch(e){toast('保存失败：'+e.message)}
  finally{btn.innerHTML='💾 直接保存';updateRecordButtons()}
}
function resetForm(){
  images=[];renderPreviews();selectedSubjects.clear();
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  $('hours').value='';$('memo').value='';updateRecordButtons();
}

/* AI 分析 */
function isVLModel(model){return VL_KEYWORDS.some(k=>model.toLowerCase().includes(k))}

async function analyze(){
  const apiKey=readSens('apiKey');
  if(!apiKey){toast('请先在设置中填写 API Key');switchTab('settings');return}
  if(!hasContent()){toast('请填写学习信息');return}
  const c=cfg();
  const provider=c.apiProvider||'siliconflow';
  const customModel=$('apiModel').value.trim();
  const apiModel=customModel||(c.apiModel||DEFAULT_MODEL[provider]);
  const endpoint=ENDPOINTS[provider];
  const subjects=getSubjectsStr();
  const hours=$('hours').value;
  const memo=$('memo').value;
  const btn=$('analyzeBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>分析中…';

  const useVision=isVLModel(apiModel)&&images.length>0;
  const prompt=`你是一位专业的考研学习辅导助手，请根据以下今日学习信息${useVision?'和图片':''}进行详细分析。

今日学习信息：
- 日期：${today()}
- 学习科目：${subjects||'未填写'}
- 学习时长：${hours?hours+'小时':'未填写'}
- 今日备注：${memo||'无'}
${images.length>0?`- 上传图片：${images.length}张（笔记/错题等）`:''}

请从以下五个维度分析，用【标题】格式，直接段落输出，不使用任何Markdown符号：

【今日内容概览】
根据科目、备注${useVision?'和图片':''}，概述今日学习的主要内容范围和知识点。

【逐科分析】
针对每个科目分别分析：学习内容、掌握情况、重难点。

【错题 / 薄弱点】
根据备注${useVision?'和图片':''}体现的问题，分析薄弱点并给出针对性建议。

【学习效率评估】
根据学习时长和科目数量评估今日效率，指出可改进之处。

【明日计划建议】
给出具体可执行的明日学习计划，包括时间分配和各科重点。`;

  let content=[];
  if(useVision)images.forEach(img=>content.push({type:'image_url',image_url:{url:img.data}}));
  content.push({type:'text',text:prompt});

  try{
    const resp=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify({model:apiModel,max_tokens:2000,messages:[{role:'user',content}]})});
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.error?.message||'请求失败');
    const text=data.choices?.[0]?.message?.content||'';
    pending={date:today(),subjects,hours,memo,analysis:text,images:images.map(i=>i.data)};
    renderResult(text,provider,apiModel);
  }catch(e){toast('分析失败：'+e.message)}
  finally{btn.disabled=false;btn.innerHTML='🤖 AI 分析'}
}

function renderResult(text,provider,model){
  const lbl=provider==='siliconflow'?'硅基流动':'DeepSeek';
  const html=text.replace(/【(.+?)】/g,'<span class="section-title">$1</span>').replace(/\n/g,'<br>');
  $('resultArea').innerHTML=`
    <div class="result-card">
      <div class="result-meta">
        <span class="meta-label">分析完成 · ${today()} · ${lbl} / ${model}</span>
        <button class="btn" id="saveAnalysisBtn" onclick="saveAnalysisRecord()">保存分析结果</button>
      </div>
      <div class="result-content">${html}</div>
    </div>`;
}

async function saveAnalysisRecord(){
  if(!pending)return;
  const btn=$('saveAnalysisBtn');btn.disabled=true;btn.innerHTML='<span class="spinner-sm"></span> 保存中…';
  try{
    const dest=await upsert(pending);
    toast(dest==='cloud'?'已同步到云端':'已保存到本地');
    btn.textContent=dest==='cloud'?'已同步云端 ✓':'已保存本地 ✓';
    resetForm();pending=null;
  }catch(e){toast('保存失败：'+e.message);btn.disabled=false;btn.textContent='保存分析结果'}
}

/* 切换 Tab */
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['record','history','settings'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  $('panel-'+name).classList.add('active');
  if(name==='history')renderHistory();
}

/* 历史回顾 */
async function renderHistory(){
  const list=$('recordList');
  list.innerHTML='<div class="empty"><span class="spinner-sm"></span></div>';
  const filter=$('filterSel').value;
  let records=await loadRecords();
  const now=new Date();
  if(filter==='week')records=records.filter(r=>new Date(r.date)>=new Date(now-7*864e5));
  if(filter==='month')records=records.filter(r=>new Date(r.date)>=new Date(now-30*864e5));
  _records=records;
  const totalH=records.reduce((s,r)=>s+(parseFloat(r.hours)||0),0);
  const subs=[...new Set(records.flatMap(r=>(r.subjects||'').split(/[,，、]/).map(s=>s.trim()).filter(Boolean)))];
  $('statsRow').innerHTML=`
    <div class="stat-box"><div class="s-label">记录天数</div><div class="s-value">${records.length}</div></div>
    <div class="stat-box"><div class="s-label">累计学习</div><div class="s-value">${totalH.toFixed(1)}<span class="s-unit"> h</span></div></div>
    <div class="stat-box"><div class="s-label">涉及科目</div><div class="s-value" style="font-size:15px;padding-top:3px">${subs.slice(0,4).join('、')||'—'}</div></div>`;
  if(!records.length){list.innerHTML='<div class="empty">暂无记录<br>完成今日记录后保存即可在此查看</div>';return}
  list.innerHTML=records.map((r,i)=>{
    const tags=(r.subjects||'').split(/[,，、]/).map(s=>s.trim()).filter(Boolean);
    const excerpt=(r.analysis||'（无 AI 分析）').replace(/【.+?】/g,'').replace(/\n/g,' ').substring(0,80)+'…';
    return`<div class="record-item" onclick="openRecord(${i})">
      <div class="record-item-top"><span class="record-date">${r.date}</span>
        <div class="tags">${tags.slice(0,4).map(t=>`<span class="tag">${t}</span>`).join('')}${r.hours?`<span class="tag">${r.hours}h</span>`:''}${sb?'<span class="tag cloud">云端</span>':''}</div>
      </div>
      <div class="record-excerpt">${excerpt}</div>
    </div>`;
  }).join('');
}

function openRecord(i){
  const r=_records[i];if(!r)return;
  $('modalTitle').textContent=r.date+' 学习记录';
  const imgs=Array.isArray(r.images)?r.images:[];
  $('modalImgs').innerHTML=imgs.map(s=>`<img src="${s}"/>`).join('');
  $('modalImgs').style.display=imgs.length?'grid':'none';
  $('modalBody').textContent=(r.analysis||'（无 AI 分析）').replace(/【(.+?)】/g,'\n━━ $1 ━━\n').replace(/^\n/,'');
  $('overlay').style.display='flex';
}
function closeModal(){$('overlay').style.display='none'}

/* 导出 Markdown */
function toggleExportMenu(e){e.stopPropagation();$('exportDd').classList.toggle('open')}
document.addEventListener('click',()=>$('exportDd').classList.remove('open'));

function exportMd(range){
  $('exportDd').classList.remove('open');
  const all=_records.length?_records:localRecords();
  const now=new Date();
  let filtered=all,label='全部';
  if(range==='today'){const t=today();filtered=all.filter(r=>r.date===t);label='今天'}
  else if(range==='week'){filtered=all.filter(r=>new Date(r.date)>=new Date(now-7*864e5));label='本周'}
  else if(range==='month'){filtered=all.filter(r=>new Date(r.date)>=new Date(now-30*864e5));label='本月'}
  if(!filtered.length){toast('该时间范围暂无记录');return}

  const totalH=filtered.reduce((s,r)=>s+(parseFloat(r.hours)||0),0);
  const allSubs=[...new Set(filtered.flatMap(r=>(r.subjects||'').split(/[,，、]/).map(s=>s.trim()).filter(Boolean)))];

  let md=`# 学习日志 · ${label}\n\n`;
  md+=`> 导出时间：${new Date().toLocaleString('zh-CN')}  \n`;
  md+=`> 共 **${filtered.length}** 条记录 · 累计学习 **${totalH.toFixed(1)}** 小时 · 涉及科目：${allSubs.join('、')||'—'}\n\n---\n\n`;

  filtered.forEach(r=>{
    const subs=(r.subjects||'').split(/[,，、]/).map(s=>s.trim()).filter(Boolean);
    md+=`## 📅 ${r.date}\n\n`;
    md+=`| 项目 | 内容 |\n| :--- | :--- |\n`;
    md+=`| 学习科目 | ${subs.length?subs.join('、'):'—'} |\n`;
    md+=`| 学习时长 | ${r.hours?r.hours+'小时':'—'} |\n`;
    md+=`| 备注 | ${(r.memo||'—').replace(/\n/g,' ').replace(/\|/g,'\\|')} |\n\n`;
    if(r.analysis){
      md+=`### 🤖 AI 分析\n\n`;
      const parts=r.analysis.split(/(【.+?】)/);
      let inSection=false;
      parts.forEach(p=>{
        if(/^【.+?】$/.test(p)){md+=`\n#### ${p.slice(1,-1)}\n\n`;inSection=true}
        else if(p.trim()){md+=inSection?p.trim()+'\n\n':p.trim()+'\n\n'}
      });
    }else{md+=`*本条记录未进行 AI 分析*\n\n`}
    md+=`---\n\n`;
  });

  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`学习日志_${label}_${today()}.md`;a.click();
  toast(`已导出 ${filtered.length} 条记录`);
}

/* 设置锁定 */
function toggleApiLock(){
  apiLocked=!apiLocked;
  $('apiCfgBody').classList.toggle('cfg-locked',apiLocked);
  $('apiLockBtn').textContent=apiLocked?'🔒 已锁定':'🔓 已解锁';
}
function toggleSbLock(){
  sbLocked=!sbLocked;
  $('sbCfgBody').classList.toggle('cfg-locked',sbLocked);
  $('sbLockBtn').textContent=sbLocked?'🔒 已锁定':'🔓 已解锁';
}

/* 模型下拉 */
function populateModelSelect(provider){
  const sel=$('modelSelect');sel.innerHTML='';
  (MODEL_PRESETS[provider]||[]).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
}
function onModelSelectChange(){$('apiModel').value=''}
function onProviderChange(){
  const p=$('apiProvider').value;populateModelSelect(p);$('apiModel').value='';
  $('providerHint').textContent=p==='deepseek'?'deepseek-chat 为纯文字分析模型':'推荐 Qwen2.5-VL-72B 支持图片识别';
  $('apiKeyLabel').textContent=p==='deepseek'?'DeepSeek API Key':'硅基流动 API Key';
}

function saveApiSettings(){
  const provider=$('apiProvider').value;
  const key=$('apiKey').value.trim();
  const custom=$('apiModel').value.trim();
  const model=custom||$('modelSelect').value;
  if(!key){toast('请填写 API Key');return}
  cfg({apiProvider:provider,apiModel:model});saveSens('apiKey',key);
  toast('API 设置已保存');toggleApiLock();testApiConnection(false);
}

async function testApiConnection(showToast=true){
  const apiKey=readSens('apiKey');
  const statusEl=$('apiConnStatus');
  if(!apiKey){setSyncStatus('api',false,'未配置密钥');if(statusEl){statusEl.textContent='未配置密钥';statusEl.className='conn-status err'}return false}
  const c=cfg();
  const provider=c.apiProvider||'siliconflow';
  const model=c.apiModel||DEFAULT_MODEL[provider];
  const endpoint=ENDPOINTS[provider];
  setSyncStatus('api',false,'检测中…');
  if(statusEl){statusEl.textContent='测试中…';statusEl.className='conn-status'}
  try{
    const resp=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify({model,max_tokens:5,messages:[{role:'user',content:'Hi'}]})});
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.error?.message||'请求失败');
    setSyncStatus('api',true,'API 已连接');
    if(statusEl){statusEl.textContent='连接成功 ✓';statusEl.className='conn-status ok'}
    if(showToast)toast('API 连接正常');return true;
  }catch(e){
    setSyncStatus('api',false,'连接失败');
    if(statusEl){statusEl.textContent='连接失败: '+e.message;statusEl.className='conn-status err'}
    if(showToast)toast('API 测试失败，请检查配置');return false;
  }
}

async function saveAndTestSb(){
  const url=$('sbUrl').value.trim(),key=$('sbKey').value.trim();
  cfg({sbUrl:url});saveSens('sbKey',key);initSb(url,key);
  const st=$('connStatus');st.textContent='测试中…';st.className='conn-status';
  const ok=await testSb();
  st.textContent=ok?'连接成功':'连接失败，请检查配置';
  st.className='conn-status '+(ok?'ok':'err');
  if(ok){toast('Supabase 已连接');if(!sbLocked)toggleSbLock()}
}

/* 设置导入导出 */
function exportSettingsJson(){
  const c=cfg();
  const blob=new Blob([JSON.stringify({apiProvider:c.apiProvider,apiModel:c.apiModel,sbUrl:c.sbUrl,_a:c.apiKey,_s:c.sbKey},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='study_settings.json';a.click();
  toast('设置已导出');
}
function importSettings(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d._a||d.apiKey){cfg({apiProvider:d.apiProvider,apiModel:d.apiModel,sbUrl:d.sbUrl,apiKey:d._a||d.apiKey,sbKey:d._s||d.sbKey});toast('导入成功，正在重载…');setTimeout(()=>location.reload(),800)}
      else toast('无效的设置文件');
    }catch{toast('解析失败')}
  };
  rd.readAsText(f);
}
function clearLocal(){localStorage.removeItem(CACHE_KEY);toast('本地缓存已清空')}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

/* 初始化 */
function init(){
  $('todayLabel').textContent=today();
  buildHoursSelect();setupDrag();
  const c=cfg();
  const provider=c.apiProvider||'siliconflow';
  $('apiProvider').value=provider;populateModelSelect(provider);onProviderChange();
  if(c.apiModel){$('modelSelect').value=c.apiModel}
  const apiKey=readSens('apiKey');if(apiKey)$('apiKey').value=apiKey;
  const sbUrl=c.sbUrl||'';const sbKey=readSens('sbKey');
  $('sbUrl').value=sbUrl;if(sbKey)$('sbKey').value=sbKey;
  if(sbUrl&&sbKey){initSb(sbUrl,sbKey);testSb()}else setSyncStatus('sync',false,'未配置');
  if(apiKey)testApiConnection(false);else setSyncStatus('api',false,'未配置密钥');
  updateRecordButtons();
}
init();
